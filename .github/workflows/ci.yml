# CI — Phase 10 T3 (LAUNCH-PLAN.md §4).
# Drop into sf-engine at .github/workflows/ci.yml
#
# PR: typecheck + test + build must be green (red blocks merge — repo rule 1).
# main: same, then deploy is handled by Cloudflare Pages' Git integration
# (connect the repo in the CF dashboard [HUMAN]; no deploy secrets needed here).
# Tag v*: placeholder job for the Phase 13 Tauri matrix build (uncomment when
# the desktop shell lands).

name: ci

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

